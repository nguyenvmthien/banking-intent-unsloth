# Base model (zero_shot / few_shot modes)
model_name: "unsloth/Qwen3-8B"

# Fine-tuned adapter (finetuned mode) — update after training
model_path: "../outputs/checkpoint"

max_seq_length: 2048
load_in_4bit: true

# Generation — must be large enough for Qwen3 to finish its thinking block
# before outputting the label (thinking alone can consume hundreds of tokens).
max_new_tokens: 512

# LangSmith
langsmith_api_key: "YOUR KEY HERE"
langsmith_project: "banking-intent-v2"

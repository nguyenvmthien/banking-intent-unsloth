# Base model (zero_shot / few_shot modes)
model_name: "unsloth/Qwen3-8B"

# Fine-tuned adapter (finetuned mode) — update after training
model_path: "../outputs/checkpoint"

max_seq_length: 2048
load_in_4bit: true

# Generation tokens for zero_shot / few_shot (base model uses thinking — needs room
# to finish the thinking block before outputting the label).
max_new_tokens: 512

# Generation tokens for finetuned mode — fine-tuned model outputs the label directly.
max_new_tokens_finetuned: 32

# Batch size for evaluate.py — reduce if OOM, increase for faster evaluation.
batch_size: 8

# LangSmith
langsmith_api_key: "YOUR KEY HERE"
langsmith_project: "banking-intent-v2"
